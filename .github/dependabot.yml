version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 14
  - package-ecosystem: "uv"
    directories:
      - "/"
      - "/fake-sbatch"
      - "/jobbergate-agent"
      - "/jobbergate-api"
      - "/jobbergate-cli"
      - "/jobbergate-core"
      - "/jobbergate-docs"
      - "/jobbergate-test"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 14
