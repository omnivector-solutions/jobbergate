name: Prepare for release

# This action:
#   - Is triggered manually in a workflow dispatch;
#   - Create a new header for the new version at the changelogs;
#   - Create a new branch named prepare-release/<new_version>;
#   - Open a draft PR to the main branch, so all the changes above can be reviewed by the team before merging.

on:
  workflow_dispatch:
    inputs:
      release_number:
        type: string
        description: Release number

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    env:
      RELEASE_NUMBER: ${{ github.event.inputs.release_number }}
    steps:
      - name: Check if release number is provided
        run: |
          if [ -z "$RELEASE_NUMBER" ]; then
            echo "Release number is required. Please provide it in the workflow dispatch inputs."
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Update Changelog
        run: uv run towncrier build --yes --version $RELEASE_NUMBER

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        name: Create Pull Request
        id: cpr
        with:
          token: ${{ secrets.TOKEN }}
          commit-message: "Prepared release ${{ env.RELEASE_NUMBER }}"
          branch: "prepare-release/${{ env.RELEASE_NUMBER }}"
          title: "Release ${{ env.RELEASE_NUMBER }}"
          draft: true
          delete-branch: true
          body: "Automated changes by [prepare_release](https://github.com/omnivector-solutions/jobbergate/blob/main/.github/workflows/prepare_release.yaml) GitHub action."

      - name: Show Pull Request info
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
